services:
  app:
    image: laravelphp/php-fpm:8.3
    build: ./php
    container_name: challenge_app
    volumes:
      - ./src:/var/www/html
    environment:
      - TMPDIR=/var/www/html/storage/tmp
    depends_on:
      - db

  nginx:
    image: nginx:stable
    container_name: challenge_nginx
    ports:
      - "8083:80"
    volumes:
      - ./src:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  db:
    image: postgres:16
    container_name: challenge_db
    environment:
      POSTGRES_USER: jemp
      POSTGRES_PASSWORD: challenge
      POSTGRES_DB: tariff-importer
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
